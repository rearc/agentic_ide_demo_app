name: agentic-ide-demo-app
version: 0.0.1
description: |
  Multi-card React + Flask dashboard used as the Rearc workshop demo app.
  Agentic primitives (agents, instructions, skills, hooks, MCP servers) are
  provided by rearc/workshop-demo-kit, deployed via `apm install`.

  This branch (claude-copilot-ready) replaces the cursor-specific .cursor/
  layer that lives on main with APM-deployed primitives that work for
  Claude Code, GitHub Copilot, and Cursor uniformly.

dependencies:
  apm:
    # Host-qualified subpath ref against the private ai-toolkit repo (the kit's
    # canonical install form — see its README + enterprise-private-host.md).
    # Replaces the old local-path dep (../ai-toolkit/packages/...). Unpinned
    # here so it tracks the repo default branch; append #<sha>/#<tag> to pin for
    # reproducibility (current kit HEAD: 91e27b0).
    # TEMPORARY local-path ref (2026-07-20), same as the pocock-kit below.
    # The canonical form is the host-qualified
    # `rearc/ai-toolkit-private/packages/rearc-workshop-demo-kit`, but Day-4 demo
    # prep needed two fixes that only exist locally until the publish chain runs:
    #   (1) its `to-prd` dep 404s (upstream renamed it `to-spec`), failing install;
    #   (2) it redeployed the deprecated ClickUp MCP server on every install,
    #       silently resurrecting it after removal.
    # Repoint to the host-qualified form once those land in ai-toolkit-private.
    - ../ai-toolkit/packages/rearc-workshop-demo-kit

    # rearc/pocock-kit (Matt Pocock's v1.1 skills, 19) - powers the Day-4 /
    # Section-4 demo: grilling -> to-spec -> to-tickets -> implement -> code-review.
    # TEMPORARY local-path ref: the kit currently lives on the unmerged
    # `kit/pocock-v1.1` branch in ai-toolkit, so it is not yet resolvable from
    # ai-toolkit-private. Repoint this to the host-qualified form
    # (`rearc/ai-toolkit-private/packages/rearc-pocock-kit`) once that branch is
    # merged and propagated. Resolves on any machine with the standard
    # side-by-side repo layout.
    - ../ai-toolkit/packages/rearc-pocock-kit
