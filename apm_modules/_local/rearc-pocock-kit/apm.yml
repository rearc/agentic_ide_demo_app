description: |
  Curated 19-skill subset of Matt Pocock's publicly-shipped skills
  (https://github.com/mattpocock/skills, MIT) distributed via APM-native
  per-skill subpath references (per ADR-0015). Tracks Pocock's v1.1 release
  (+wayfinder, +research, +implement; to-prd renamed to-spec; to-issues
  renamed to-tickets; grill/architecture logic factored into shared building
  blocks). Workshop-featured kit per ADR-0025 — the lead alternative
  primitive-stack shape in the Goldman Sachs AI workshop's Section 4.

  Curation is transitively complete: several v1.1 skills are thin shims over
  new sibling skills (grill-me -> grilling; grill-with-docs -> grilling +
  domain-modeling; implement -> tdd + code-review; wayfinder -> research +
  prototype + grilling + domain-modeling), so the building-block skills
  (grilling, domain-modeling, codebase-design, code-review) are included too —
  every bundled skill's /references resolve to a bundled sibling.

  Substrate posture: this kit makes no companion recommendation. Pocock's
  flow is a general-purpose primitive set spanning read-design and
  write-execute work, and consumers bring whichever permission posture
  matches their use. See ADR-0025.

  Pinning gate: the 19 upstream subpath refs are intentionally unpinned per
  ADR-0024. The transitive-cleanup-under-pinning bug (pinned entries omit
  resolved_by/depth, so `apm uninstall`'s orphan-detector can't prune the
  orphaned apm_modules/mattpocock/ tree) was last validated on APM 0.18.0;
  re-test against the installed APM before pinning. APM prints an unpinned-deps
  warning at every install; that warning is the visible cost. When the bug is
  confirmed fixed, pin every subpath to a single current mattpocock/skills tip
  (see NOTICE.md for the verified tip carrying all 19 skills, or whichever SHA
  the workshop's content review settles on), and the warning goes away.

  Sandcastle (mattpocock/sandcastle) is intentionally not bundled per
  ADR-0025 — it's a TypeScript orchestration library, not an APM
  primitive, and the workshop framing keeps it side-by-side with `sbx`
  rather than auto-installed alongside the skills.

dependencies:
  apm:
    # --- v1.1 SDLC arc (9) ---
    # wayfinder -> research/prototype/grilling/domain-modeling/setup;
    # implement -> tdd/code-review; to-spec/to-tickets/code-review -> setup.
    - mattpocock/skills/skills/engineering/wayfinder
    - mattpocock/skills/skills/engineering/research
    - mattpocock/skills/skills/productivity/grilling
    - mattpocock/skills/skills/engineering/to-spec
    - mattpocock/skills/skills/engineering/to-tickets
    - mattpocock/skills/skills/engineering/implement
    - mattpocock/skills/skills/engineering/tdd
    - mattpocock/skills/skills/engineering/code-review
    - mattpocock/skills/skills/engineering/prototype

    # --- Shared design vocabulary + per-repo bootstrap (3) ---
    # setup-matt-pocock-skills is a hard prerequisite for to-spec, to-tickets,
    # implement, code-review, triage, wayfinder (see README "First action").
    - mattpocock/skills/skills/engineering/setup-matt-pocock-skills
    - mattpocock/skills/skills/engineering/domain-modeling
    - mattpocock/skills/skills/engineering/codebase-design

    # --- Ergonomic grill aliases (2) ---
    - mattpocock/skills/skills/productivity/grill-me
    - mattpocock/skills/skills/engineering/grill-with-docs

    # --- Standalone take-home utilities (4) ---
    # diagnosing-bugs -> improve-codebase-architecture -> codebase-design/domain-modeling/grilling.
    - mattpocock/skills/skills/engineering/improve-codebase-architecture
    - mattpocock/skills/skills/engineering/triage
    - mattpocock/skills/skills/engineering/diagnosing-bugs
    - mattpocock/skills/skills/engineering/resolving-merge-conflicts

    # --- Meta (1) ---
    - mattpocock/skills/skills/productivity/writing-great-skills
