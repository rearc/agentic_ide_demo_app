name: rearc/workshop-demo-kit
version: 0.1.0
license: MIT
homepage: https://github.com/rearc/ai-toolkit
repository: https://github.com/rearc/ai-toolkit
author:
  name: Rearc
  url: https://github.com/rearc
keywords:
  - rearc
  - ai-toolkit
  - workshop
  - demo
  - skills
  - mcp
  - hooks
  - claude-code
  - copilot
  - apm
description: |
  Agentic-primitive layer backing the Rearc workshop demo app — a multi-card
  React + Flask dashboard used in workshops to demonstrate how Claude Code,
  Copilot, and Cursor pick up project-scoped skills, agents, instructions,
  hooks, and MCP servers via APM.

  APM-native shape (per ADR-0016). All Rearc-authored content lives under
  .apm/; four upstream skills (frontend-design, grill-me, react-best-practices,
  to-prd) are pulled in at per-skill subpath granularity (per ADR-0015) to
  replace the demo app's legacy skills-lock.json installer. Two of the
  upstream skill names have drifted since the lockfile was last refreshed —
  vercel-react-best-practices is now react-best-practices upstream, and
  write-a-prd is now to-prd. We follow upstream naming.

  No substrate companion is recommended. The demo app needs to execute code
  (npm, flask, python), but the kit's own audit/safety/lint hooks cover the
  workflow-specific safety needs for the workshop. Layering rearc/base on
  top would duplicate the audit logging. Consumers who want the broader
  rearc/base posture can install it separately — the two layer cleanly
  (modulo redundant audit calls).

  Intentionally unpinned in 0.1.0 per ADR-0024. Re-validated against APM
  0.18.0 (todo.md item 15/17): pinning a transitive dep still breaks
  `apm uninstall` cleanup (pinned entries omit resolved_by/depth). This kit
  ships its own content, so pinning would leak the deployed upstream skill
  dirs on uninstall. APM warns about unpinned deps at every install; that's
  the visible cost until the upstream bug is fixed (then pin every ref).

dependencies:
  apm:
    # Upstream skills replacing the demo app's legacy skills-lock.json
    # installer (per ADR-0015 — per-skill subpath addressing).
    - anthropics/skills/skills/frontend-design
    - mattpocock/skills/skills/productivity/grill-me
    # Upstream renamed to-prd -> to-spec in its v1.1 reshape; the old path 404s
    # and made `apm install` fail with "'skills/engineering/to-prd' not found".
    - mattpocock/skills/skills/engineering/to-spec
    - vercel-labs/agent-skills/skills/react-best-practices

  mcp:
    # ClickUp removed 2026-07-20: it was a SolutionReach-engagement artifact and
    # is deprecated. Because APM redeploys this block on every install, leaving it
    # here silently resurrected the server (and its AGENTS.md prose) in consumer
    # repos after it had been removed by hand. Do not re-add.

    # Context7 documentation-lookup remote MCP. Free tier requires no auth.
    - name: context7
      registry: false
      transport: http
      url: https://mcp.context7.com/mcp

    # Local stdio MCP server demonstrating how to ship a project-local MCP.
    # Exposes two tools (coin_flip + roll_die) so the workshop can show the
    # agent auto-selecting a tool by intent. The server source ships in the kit
    # at mcp-servers/random-tools-mcp/; the kit's scripts/setup.sh copies it
    # into the consumer's project at mcp-servers/random-tools-mcp/server.py so
    # this command resolves project-relative. uv must be on PATH at runtime.
    - name: random-tools
      registry: false
      transport: stdio
      command: uv
      args:
        - run
        - --with
        - mcp[cli]
        - mcp-servers/random-tools-mcp/server.py

scripts:
  # DEVELOPER-MODE ONLY (per ADR-0013). User-facing flow invokes
  # `bash apm_modules/_local/rearc-workshop-demo-kit/scripts/setup.sh`
  # (local-path dev) or `bash apm_modules/rearc/workshop-demo-kit/scripts/setup.sh`
  # (published ref) directly from the consumer dir. Bash prefix per ADR-0012.
  setup: bash scripts/setup.sh
